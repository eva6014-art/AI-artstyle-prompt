<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 畫風轉換提示詞引擎</title>
    
    <!-- 引入 Babel (用來在瀏覽器中編譯 JSX，放最前面避免與 Tailwind CDN 衝突) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 React 與 ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        // --- 準備 SVG 圖示元件 ---
        const UploadIcon = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>;
        const SparklesIcon = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>;
        const LoaderIcon = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" x2="12" y1="2" y2="6"/><line x1="12" x2="12" y1="18" y2="22"/><line x1="4.93" x2="7.76" y1="4.93" y2="7.76"/><line x1="16.24" x2="19.07" y1="16.24" y2="19.07"/><line x1="2" x2="6" y1="12" y2="12"/><line x1="18" x2="22" y1="12" y2="12"/><line x1="4.93" x2="7.76" y1="19.07" y2="16.24"/><line x1="16.24" x2="19.07" y1="7.76" y2="4.93"/></svg>;
        const AlertIcon = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>;
        const CheckIcon = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>;
        const CopyIcon = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>;
        const ImageIcon = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>;
        const PaletteIcon = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/><circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/><circle cx="8.5" cy="7.5" r=".5" fill="currentColor"/><circle cx="6.5" cy="12.5" r=".5" fill="currentColor"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/></svg>;
        const KeyIcon = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m15.5 7.5 2.3 2.3a1 1 0 0 0 1.4 0l2.1-2.1a1 1 0 0 0 0-1.4L19 4"/><path d="m21 2-9.6 9.6"/><circle cx="7.5" cy="15.5" r="5.5"/></svg>;
        const EyeIcon = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>;
        const EyeOffIcon = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/></svg>;

        // ── Hub 共用板整合 ────────────────────────────────────────
        var HUB_KEY = 'hub_prompt';
        function hubSave(text, source) {
            if (!text) return;
            localStorage.setItem(HUB_KEY, JSON.stringify({text: text, source: source, time: Date.now()}));
        }
        // ─────────────────────────────────────────────────────────

        function App() {
            // 從 localStorage 讀取預設的 API Key (如果有的話)
            const [apiKey, setApiKey] = useState(() => localStorage.getItem('gemini_api_key') || '');
            const [showApiKey, setShowApiKey] = useState(false);

            const [fileA, setFileA] = useState(null);
            const [previewA, setPreviewA] = useState(null);
            const [fileB, setFileB] = useState(null);
            const [previewB, setPreviewB] = useState(null);
            
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [result, setResult] = useState('');
            const [error, setError] = useState('');
            const [copied, setCopied] = useState(false);
            
            const fileInputRefA = useRef(null);
            const fileInputRefB = useRef(null);

            // 當 API Key 改變時，自動存入 localStorage
            const handleApiKeyChange = (e) => {
                const val = e.target.value;
                setApiKey(val);
                localStorage.setItem('gemini_api_key', val);
            };

            const fetchWithRetry = async (url, options, retries = 5) => {
                const delays = [1000, 2000, 4000, 8000, 16000];
                for (let i = 0; i < retries; i++) {
                    try {
                        const response = await fetch(url, options);
                        if (!response.ok) {
                            const errorData = await response.json().catch(() => ({}));
                            throw new Error(errorData.error?.message || `HTTP error! status: ${response.status}`);
                        }
                        return await response.json();
                    } catch (error) {
                        if (i === retries - 1) throw error;
                        await new Promise(resolve => setTimeout(resolve, delays[i]));
                    }
                }
            };

            const fileToBase64 = (file) => {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result.split(',')[1]);
                    reader.onerror = reject;
                    reader.readAsDataURL(file);
                });
            };

            const handleFileChange = (event, type) => {
                const file = event.target.files[0];
                if (file) {
                    if (!file.type.startsWith('image/')) {
                        setError('請上傳有效的圖片檔案 (PNG, JPEG, WEBP 等)。');
                        return;
                    }
                    if (type === 'A') {
                        setFileA(file);
                        setPreviewA(URL.createObjectURL(file));
                    } else {
                        setFileB(file);
                        setPreviewB(URL.createObjectURL(file));
                    }
                    setResult('');
                    setError('');
                }
            };

            const analyzeImages = async () => {
                const trimmedKey = apiKey.trim();
                if (!trimmedKey) {
                    setError('請先在上方輸入你的 Google Gemini API Key。');
                    return;
                }

                if (!fileA || !fileB) {
                    setError('請確認已上傳圖 A (內容) 與圖 B (風格) 兩張圖片。');
                    return;
                }

                setIsAnalyzing(true);
                setError('');
                setResult('');
                setCopied(false);

                try {
                    const [base64A, base64B] = await Promise.all([
                        fileToBase64(fileA),
                        fileToBase64(fileB)
                    ]);

                    // 使用 GA 版本的模型端點，適用於使用者自備金鑰
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${trimmedKey}`;
                    
                    const promptText = `你是一個專業的 AI 圖片提示詞（Prompt）工程師。我上傳了兩張圖片：
第一張圖片（圖片 A）是『內容主體』。
第二張圖片（圖片 B）是『風格參考』。

請分析這兩張圖，並寫出一段可以用來在 Midjourney 或 Stable Diffusion 等軟體中，將『圖片 A 的內容』轉換成『圖片 B 的風格』的關鍵描述與提示詞。

請提供以下兩種格式的內容：
1. 【風格融合描述（繁體中文）】：請精準描述這個融合後的畫面會長什麼樣子（主體與構圖保留 A，但光影、材質、筆觸、色彩、藝術氛圍完全變成 B 的風格）。
2. 【English Prompts】：提供對應的英文提示詞。請先描述 A 的主體與動作，接著大量加上 B 的風格關鍵字（例如特定的藝術流派、渲染方式、燈光效果、色彩計畫等），格式請使用逗號分隔的關鍵字與短句組合。`;

                    const payload = {
                        contents: [
                            {
                                role: "user",
                                parts: [
                                    { text: promptText },
                                    { inlineData: { mimeType: fileA.type, data: base64A } },
                                    { inlineData: { mimeType: fileB.type, data: base64B } }
                                ]
                            }
                        ]
                    };

                    const responseData = await fetchWithRetry(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    const generatedText = responseData.candidates?.[0]?.content?.parts?.[0]?.text;
                    
                    if (generatedText) {
                        setResult(generatedText);
                        hubSave(generatedText, 'artstyle');
                    } else {
                        throw new Error('無法從 API 獲取解析結果。');
                    }

                } catch (err) {
                    console.error("Analysis failed:", err);
                    setError(err.message || '解析圖片時發生錯誤，請檢查網路連線或 API Key 是否正確/有效。');
                } finally {
                    setIsAnalyzing(false);
                }
            };

            const copyToClipboard = () => {
                if (result) {
                    const textArea = document.createElement("textarea");
                    textArea.value = result;
                    document.body.appendChild(textArea);
                    textArea.select();
                    try {
                        document.execCommand('copy');
                        setCopied(true);
                        setTimeout(() => setCopied(false), 2000);
                    } catch (err) {
                        console.error('複製失敗', err);
                    }
                    document.body.removeChild(textArea);
                }
            };

            const UploadBox = ({ type, file, preview, inputRef, title, desc, icon: Icon }) => (
                <div className="flex flex-col items-center justify-center w-full">
                    <div className="w-full text-center mb-3">
                        <h3 className="font-bold text-slate-800 flex items-center justify-center gap-2">
                            <Icon className={`w-5 h-5 ${type === 'A' ? 'text-blue-500' : 'text-purple-500'}`} />
                            {title}
                        </h3>
                        <p className="text-xs text-slate-500">{desc}</p>
                    </div>
                    
                    {!preview ? (
                        <div 
                            onClick={() => inputRef.current.click()}
                            className={`w-full h-48 md:h-56 border-2 border-dashed rounded-xl flex flex-col items-center justify-center cursor-pointer transition-colors
                                ${type === 'A' ? 'border-blue-200 hover:bg-blue-50 hover:border-blue-400' : 'border-purple-200 hover:bg-purple-50 hover:border-purple-400'}`}
                        >
                            <UploadIcon className="w-8 h-8 text-slate-400 mb-2" />
                            <p className="text-sm font-medium text-slate-600">點擊上傳</p>
                        </div>
                    ) : (
                        <div className="w-full space-y-3">
                            <div className="relative rounded-xl overflow-hidden bg-slate-100 flex justify-center items-center h-48 md:h-56 border border-slate-200">
                                <img src={preview} alt={`Preview ${type}`} className="max-w-full max-h-full object-contain" />
                            </div>
                            <div className="flex justify-center">
                                <button 
                                    onClick={() => inputRef.current.click()}
                                    className="text-xs text-slate-500 hover:text-slate-800 font-medium px-3 py-1 bg-slate-200 hover:bg-slate-300 rounded-lg transition-colors"
                                >
                                    更換圖片
                                </button>
                            </div>
                        </div>
                    )}
                    
                    <input 
                        type="file" 
                        ref={inputRef} 
                        onChange={(e) => handleFileChange(e, type)} 
                        accept="image/*" 
                        className="hidden" 
                    />
                </div>
            );

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-4xl mx-auto space-y-6">
                        
                        <div className="text-center space-y-2 mb-6 mt-4">
                            <div className="inline-flex items-center justify-center p-3 bg-gradient-to-br from-blue-100 to-purple-100 rounded-full mb-2 shadow-sm">
                                <SparklesIcon className="w-8 h-8 text-indigo-600" />
                            </div>
                            <h1 className="text-3xl md:text-4xl font-bold tracking-tight text-slate-900">
                                AI 畫風轉換提示詞引擎
                            </h1>
                            <p className="text-slate-500">上傳「主體」與「風格」兩張圖，讓 AI 幫你寫出完美融合的 Prompts。</p>
                        </div>

                        {/* API Key 輸入區塊 */}
                        <div className="bg-blue-50/70 border border-blue-100 p-4 md:p-5 rounded-2xl mb-8 flex flex-col md:flex-row items-start md:items-center gap-4 shadow-sm">
                            <div className="flex items-center gap-2 text-blue-800 min-w-max">
                                <KeyIcon className="w-5 h-5" />
                                <span className="font-semibold text-sm">API Key 設定</span>
                            </div>
                            <div className="relative flex-1 w-full">
                                <input
                                    type={showApiKey ? "text" : "password"}
                                    value={apiKey}
                                    onChange={handleApiKeyChange}
                                    placeholder="請輸入或貼上你的 Google Gemini API Key..."
                                    className="w-full pl-3 pr-10 py-2.5 rounded-xl border border-blue-200 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white text-sm transition-all"
                                />
                                <button
                                    onClick={() => setShowApiKey(!showApiKey)}
                                    className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600"
                                    title={showApiKey ? "隱藏金鑰" : "顯示金鑰"}
                                >
                                    {showApiKey ? <EyeOffIcon className="w-5 h-5"/> : <EyeIcon className="w-5 h-5"/>}
                                </button>
                            </div>
                            <a 
                                href="https://aistudio.google.com/app/apikey" 
                                target="_blank" 
                                rel="noopener noreferrer"
                                className="text-xs text-blue-600 hover:text-blue-800 hover:underline min-w-max bg-blue-100 px-3 py-1.5 rounded-lg font-medium transition-colors"
                            >
                                取得免費金鑰 ↗
                            </a>
                        </div>

                        <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 md:p-8">
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                                <UploadBox 
                                    type="A" 
                                    file={fileA} 
                                    preview={previewA} 
                                    inputRef={fileInputRefA}
                                    title="圖片 A：內容主體"
                                    desc="你想要畫什麼？(例如：一隻貓、一棟建築)"
                                    icon={ImageIcon}
                                />
                                <UploadBox 
                                    type="B" 
                                    file={fileB} 
                                    preview={previewB} 
                                    inputRef={fileInputRefB}
                                    title="圖片 B：風格參考"
                                    desc="你想要什麼畫風？(例如：水彩、賽博龐克)"
                                    icon={PaletteIcon}
                                />
                            </div>

                            {error && (
                                <div className="bg-red-50 text-red-700 p-4 rounded-xl flex items-start gap-3 text-sm mb-6 border border-red-100">
                                    <AlertIcon className="w-5 h-5 shrink-0 mt-0.5" />
                                    <p>{error}</p>
                                </div>
                            )}

                            <button
                                onClick={analyzeImages}
                                disabled={!fileA || !fileB || isAnalyzing}
                                className={`w-full py-4 rounded-xl font-bold text-white text-lg transition-all flex items-center justify-center gap-2 shadow-sm
                                    ${(!fileA || !fileB || isAnalyzing) 
                                        ? 'bg-slate-300 cursor-not-allowed' 
                                        : 'bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 hover:shadow-md active:scale-[0.99]'}`}
                            >
                                {isAnalyzing ? (
                                    <>
                                        <LoaderIcon className="w-6 h-6 animate-spin" />
                                        AI 正在萃取風格與內容...
                                    </>
                                ) : (
                                    <>
                                        <SparklesIcon className="w-6 h-6" />
                                        融合生成雙語提示詞
                                    </>
                                )}
                            </button>
                        </div>

                        {result && (
                            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 md:p-8 transition-all duration-500">
                                <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between mb-4 gap-4">
                                    <h2 className="text-xl font-bold text-slate-800 flex items-center gap-2">
                                        <CheckIcon className="w-6 h-6 text-green-500" />
                                        風格轉換 Prompts 準備完成
                                    </h2>
                                    <button 
                                        onClick={copyToClipboard}
                                        className="flex items-center gap-1.5 text-sm font-medium text-slate-600 hover:text-indigo-600 bg-slate-100 hover:bg-indigo-50 px-4 py-2 rounded-lg transition-colors w-full sm:w-auto justify-center"
                                    >
                                        {copied ? <CheckIcon className="w-4 h-4" /> : <CopyIcon className="w-4 h-4" />}
                                        {copied ? '已複製' : '一鍵複製全部內容'}
                                    </button>
                                </div>
                                
                                <div className="bg-slate-50 p-5 md:p-6 rounded-xl border border-slate-200">
                                    <div className="text-slate-700 whitespace-pre-wrap leading-relaxed font-mono text-sm md:text-base">
                                        {result}
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
